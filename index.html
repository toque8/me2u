<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>me2u — приватный чат</title>
  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- Trystero -->
  <script type="importmap">
    {
      "imports": {
        "trystero": "https://esm.run/trystero@0.19.1"
      }
    }
  </script>
  <!-- uPeerJS -->
  <script src="https://cdn.jsdelivr.net/npm/upeerjs@latest/dist/upeerjs.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ----- Переменные темы (тёмная по умолчанию) ----- */
    body {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1f1f1f;
      --bg-input: #2c2c2e;
      --border-color: #2c2c2e;
      --text-primary: #e4e4e7;
      --text-secondary: #8e8e93;
      --accent: #ff9f6e;
      --accent-hover: #ffb08a;
      --message-incoming-bg: #1f1f1f;
      --message-outgoing-bg: #ff9f6e;
      --message-outgoing-text: #0f0f0f;
      --system-text: #8e8e93;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    body.light {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --bg-input: #e9e9ef;
      --border-color: #d9d9df;
      --text-primary: #1c1c1e;
      --text-secondary: #6c6c70;
      --accent: #e67e22;
      --accent-hover: #f39c12;
      --message-incoming-bg: #ffffff;
      --message-outgoing-bg: #e67e22;
      --message-outgoing-text: #ffffff;
      --system-text: #1c1c1e;
    }

    /* ----- Шапка ----- */
    .chat-header {
      background: var(--bg-secondary);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-info {
      flex: 1;
    }
    .chat-name {
      font-weight: 500;
      font-size: 17px;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .chat-status {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .theme-toggle {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      color: var(--text-secondary);
      transition: background 0.2s;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle:hover {
      background: var(--bg-input);
    }
    .download-history {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      color: var(--accent);
      margin-right: 8px;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .download-history:hover {
      background: var(--bg-input);
    }

    /* ----- Область сообщений ----- */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg-primary);
    }
    .message {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .message.incoming {
      background: var(--message-incoming-bg);
      color: var(--text-primary);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message.outgoing {
      background: var(--message-outgoing-bg);
      color: var(--message-outgoing-text);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message-content {
      flex: 1;
    }
    .file-message, .voice-message {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .file-message a, .voice-message audio {
      max-width: 100%;
    }
    .system-message {
      text-align: center;
      font-size: 12px;
      color: var(--system-text);
      margin: 8px auto;
      background: rgba(31, 31, 31, 0.6);
      padding: 4px 12px;
      border-radius: 16px;
      align-self: center;
      max-width: 90%;
    }
    body.light .system-message {
      background: rgba(0, 0, 0, 0.05);
    }
    .typing-indicator {
      font-size: 12px;
      color: var(--system-text);
      margin: 4px 16px;
      font-style: italic;
    }

    /* ----- Панель ввода (адаптивная) ----- */
    .input-area {
      background: var(--bg-secondary);
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
      align-items: center;
    }
    #message-input {
      flex: 1;
      min-width: 0; /* важно для сжатия */
      background: var(--bg-input);
      border: none;
      border-radius: 24px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
    }
    #message-input::placeholder {
      color: var(--text-secondary);
    }
    /* Кнопки с серым фоном и персиковой иконкой */
    .circle-btn {
      background: var(--bg-input);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
      color: var(--accent);
    }
    .circle-btn svg {
      width: 20px;
      height: 20px;
      fill: var(--accent);
      stroke: none;
    }
    .circle-btn:hover {
      background: var(--border-color);
    }
    .circle-btn:active {
      transform: scale(0.96);
    }
    /* Кнопка создания комнаты */
    .create-room-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
    }
    .create-room-btn {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .create-room-btn span {
      font-size: 32px;
      color: white;
      font-weight: 300;
      line-height: 1;
    }
    .create-room-btn:hover {
      background: var(--accent-hover);
    }
    .hidden {
      display: none !important;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 12px;
      cursor: pointer;
      border: 1px solid var(--border-color);
    }
    .avatar-upload {
      display: none;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    audio, video {
      max-width: 100%;
      border-radius: 12px;
    }

    /* Мобильные стили */
    @media (max-width: 600px) {
      .chat-messages { padding: 12px; }
      .message { max-width: 90%; }
      .circle-btn { width: 38px; height: 38px; }
      .circle-btn svg { width: 18px; height: 18px; }
      #message-input { padding: 8px 12px; font-size: 15px; }
      .input-area { padding: 6px 10px; gap: 6px; }
      .create-room-btn { width: 48px; height: 48px; }
      .create-room-btn span { font-size: 28px; }
      .avatar { width: 32px; height: 32px; }
      .message-avatar { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <div class="header-left">
      <img id="avatar-img" class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238e8e93'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="avatar">
      <div class="chat-info">
        <div class="chat-name">me2u</div>
        <div class="chat-status" id="status">не в сети</div>
      </div>
    </div>
    <div style="display: flex; align-items: center;">
      <button id="download-history-btn" class="download-history" title="Скачать историю">💾</button>
      <button id="theme-toggle" class="theme-toggle">🌙</button>
    </div>
  </div>

  <div class="chat-messages" id="chat-log"></div>
  <div id="typing-indicator" class="typing-indicator hidden">печатает</div>

  <div id="create-panel" class="create-room-panel">
    <button id="create-room-btn" class="create-room-btn"><span>+</span></button>
  </div>

  <div id="chat-panel" class="input-area hidden">
    <input type="text" id="message-input" placeholder="Сообщение..." disabled>
    <button id="send-button" class="circle-btn" title="Отправить">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
    <button id="voice-record-btn" class="circle-btn" title="Голосовое сообщение">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
      </svg>
    </button>
    <button id="file-attach-btn" class="circle-btn" title="Прикрепить файл">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
      </svg>
    </button>
  </div>

  <input type="file" id="file-input" style="display:none" multiple>
  <input type="file" id="avatar-input" accept="image/*" style="display:none">

  <script type="module">
    // ------------------- DOM элементы -------------------
    const statusDiv = document.getElementById('status');
    const chatLog = document.getElementById('chat-log');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const createPanel = document.getElementById('create-panel');
    const chatPanel = document.getElementById('chat-panel');
    const createRoomBtn = document.getElementById('create-room-btn');
    const themeToggle = document.getElementById('theme-toggle');
    const downloadBtn = document.getElementById('download-history-btn');
    const fileAttachBtn = document.getElementById('file-attach-btn');
    const voiceRecordBtn = document.getElementById('voice-record-btn');
    const fileInput = document.getElementById('file-input');
    const avatarImg = document.getElementById('avatar-img');
    const avatarInput = document.getElementById('avatar-input');
    const typingDiv = document.getElementById('typing-indicator');

    // ------------------- Состояние -------------------
    let currentRoomId = null;
    let isConnected = false;
    let myPeerId = null;
    let messagesHistory = [];
    let typingTimeout = null;
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let currentTheme = 'dark';
    let myAvatar = null;
    let peerAvatar = null;
    
    // Переменные для разных стратегий подключения
    let currentStrategy = null; // 'peerjs', 'trystero', 'direct', 'upeerjs'
    let currentConn = null;
    let sendMessageCallback = null;
    let trysteroRoom = null;
    let upeerjsPeer = null;
    
    // Список сигнальных серверов PeerJS для fallback
    const PEER_SERVERS = [
      { host: '0.peerjs.com', port: 443, secure: true, path: '/' },
      { host: 'peerjs-server.herokuapp.com', port: 443, secure: true, path: '/' },
      { host: 'my-peerjs-server.herokuapp.com', port: 443, secure: true, path: '/' },
      { host: 'peerjs.herokuapp.com', port: 443, secure: true, path: '/' }
    ];
    let currentServerIndex = 0;
    
    // Флаги для отслеживания попыток подключения
    let connectionAttempts = 0;
    let maxAttempts = 4;

    // ------------------- Вспомогательные UI -------------------
    function addSystemMessage(text) {
      const sysDiv = document.createElement('div');
      sysDiv.classList.add('system-message');
      sysDiv.textContent = text;
      chatLog.appendChild(sysDiv);
      sysDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function addMessageToUI(messageObj) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message');
      messageDiv.classList.add(messageObj.isMy ? 'outgoing' : 'incoming');
      messageDiv.setAttribute('data-id', messageObj.id);
      
      if (!messageObj.isMy && peerAvatar) {
        const avatarImgEl = document.createElement('img');
        avatarImgEl.src = peerAvatar;
        avatarImgEl.className = 'message-avatar';
        messageDiv.appendChild(avatarImgEl);
      } else if (!messageObj.isMy && !peerAvatar) {
        const avatarImgEl = document.createElement('img');
        avatarImgEl.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238e8e93'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
        avatarImgEl.className = 'message-avatar';
        messageDiv.appendChild(avatarImgEl);
      }
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      
      if (messageObj.type === 'text') {
        contentDiv.textContent = messageObj.text;
      } else if (messageObj.type === 'file') {
        const wrapper = document.createElement('div');
        wrapper.className = 'file-message';
        const link = document.createElement('a');
        link.href = messageObj.url;
        link.download = messageObj.name;
        link.textContent = `📎 ${messageObj.name}`;
        link.target = '_blank';
        wrapper.appendChild(link);
        contentDiv.appendChild(wrapper);
      } else if (messageObj.type === 'voice') {
        const wrapper = document.createElement('div');
        wrapper.className = 'voice-message';
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = messageObj.url;
        wrapper.appendChild(audio);
        contentDiv.appendChild(wrapper);
      }
      messageDiv.appendChild(contentDiv);
      chatLog.appendChild(messageDiv);
      messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function saveHistoryToLocal() {
      if (currentRoomId) {
        localStorage.setItem(`chat_history_${currentRoomId}`, JSON.stringify(messagesHistory));
      }
    }

    function loadHistoryFromLocal() {
      if (currentRoomId) {
        const saved = localStorage.getItem(`chat_history_${currentRoomId}`);
        if (saved) {
          try {
            messagesHistory = JSON.parse(saved);
            while (chatLog.firstChild) chatLog.removeChild(chatLog.firstChild);
            messagesHistory.forEach(msg => addMessageToUI(msg));
          } catch(e) { console.warn(e); }
        }
      }
    }

    function addMessageToHistory(messageObj) {
      messagesHistory.push(messageObj);
      saveHistoryToLocal();
    }

    // ------------------- Отправка сообщений (общая) -------------------
    async function sendTextMessage(text) {
      if (text.trim() && currentConn && isConnected) {
        const msgId = Date.now() + '-' + Math.random().toString(36);
        const msgObj = {
          id: msgId,
          type: 'text',
          text: text,
          senderId: myPeerId,
          timestamp: Date.now(),
          isMy: true
        };
        
        // Отправляем в зависимости от стратегии
        if (currentStrategy === 'peerjs' && currentConn && currentConn.open) {
          currentConn.send({ type: 'message', data: msgObj });
        } else if (currentStrategy === 'trystero' && sendMessageCallback) {
          sendMessageCallback(msgObj);
        } else if (currentStrategy === 'upeerjs' && upeerjsPeer) {
          upeerjsPeer.send({ type: 'message', data: msgObj });
        }
        
        addMessageToUI(msgObj);
        addMessageToHistory(msgObj);
        messageInput.value = '';
      } else if (!isConnected) {
        addSystemMessage('Нет соединения с собеседником');
      }
    }

    async function sendFile(file) {
      if (!currentConn || !isConnected) {
        addSystemMessage('Нет соединения');
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const arrayBuffer = reader.result;
        const msgId = Date.now() + '-' + Math.random().toString(36);
        const msgObj = {
          id: msgId,
          type: 'file',
          name: file.name,
          mime: file.type,
          data: arrayBuffer,
          senderId: myPeerId,
          timestamp: Date.now(),
          isMy: true
        };
        
        if (currentStrategy === 'peerjs' && currentConn && currentConn.open) {
          currentConn.send({ type: 'file_transfer', data: msgObj });
        } else if (currentStrategy === 'trystero' && sendMessageCallback) {
          sendMessageCallback({ type: 'file_transfer', data: msgObj });
        } else if (currentStrategy === 'upeerjs' && upeerjsPeer) {
          upeerjsPeer.send({ type: 'file_transfer', data: msgObj });
        }
        
        const url = URL.createObjectURL(file);
        const displayObj = { ...msgObj, url: url, isMy: true };
        addMessageToUI(displayObj);
        addMessageToHistory(displayObj);
      };
      reader.readAsArrayBuffer(file);
    }

    async function sendVoice(blob) {
      if (!currentConn || !isConnected) return;
      const msgId = Date.now() + '-' + Math.random().toString(36);
      const reader = new FileReader();
      reader.onload = () => {
        const arrayBuffer = reader.result;
        const msgObj = {
          id: msgId,
          type: 'voice',
          data: arrayBuffer,
          senderId: myPeerId,
          timestamp: Date.now(),
          isMy: true
        };
        
        if (currentStrategy === 'peerjs' && currentConn && currentConn.open) {
          currentConn.send({ type: 'voice_transfer', data: msgObj });
        } else if (currentStrategy === 'trystero' && sendMessageCallback) {
          sendMessageCallback({ type: 'voice_transfer', data: msgObj });
        } else if (currentStrategy === 'upeerjs' && upeerjsPeer) {
          upeerjsPeer.send({ type: 'voice_transfer', data: msgObj });
        }
        
        const url = URL.createObjectURL(blob);
        const displayObj = { ...msgObj, url: url, isMy: true };
        addMessageToUI(displayObj);
        addMessageToHistory(displayObj);
      };
      reader.readAsArrayBuffer(blob);
    }

    function sendTyping() {
      if (currentConn && isConnected) {
        if (currentStrategy === 'peerjs' && currentConn && currentConn.open) {
          currentConn.send({ type: 'typing' });
        } else if (currentStrategy === 'trystero' && sendMessageCallback) {
          sendMessageCallback({ type: 'typing' });
        } else if (currentStrategy === 'upeerjs' && upeerjsPeer) {
          upeerjsPeer.send({ type: 'typing' });
        }
      }
    }

    function showTypingFromRemote() {
      typingDiv.classList.remove('hidden');
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        typingDiv.classList.add('hidden');
      }, 2000);
    }

    function sendMyAvatar() {
      if (currentConn && isConnected && myAvatar) {
        if (currentStrategy === 'peerjs' && currentConn && currentConn.open) {
          currentConn.send({ type: 'avatar', data: myAvatar });
        } else if (currentStrategy === 'trystero' && sendMessageCallback) {
          sendMessageCallback({ type: 'avatar', data: myAvatar });
        } else if (currentStrategy === 'upeerjs' && upeerjsPeer) {
          upeerjsPeer.send({ type: 'avatar', data: myAvatar });
        }
      }
    }

    function setControlsEnabled(enabled) {
      messageInput.disabled = !enabled;
      sendButton.disabled = !enabled;
      fileAttachBtn.disabled = !enabled;
      voiceRecordBtn.disabled = !enabled;
      if (enabled) messageInput.focus();
    }

    // ------------------- Стратегия 1: PeerJS с переключением серверов -------------------
    function tryPeerJSServer(roomId, isHost, onSuccess, onFail) {
      const config = PEER_SERVERS[currentServerIndex];
      addSystemMessage(`Пробуем подключение через PeerJS (сервер: ${config.host})...`);
      
      let peer;
      if (isHost) {
        peer = new Peer(roomId, config);
      } else {
        peer = new Peer(config);
      }
      
      const timeout = setTimeout(() => {
        peer.destroy();
        onFail();
      }, 10000);
      
      peer.on('open', (id) => {
        clearTimeout(timeout);
        myPeerId = id;
        addSystemMessage(`PeerJS подключен (${config.host})`);
        
        if (isHost) {
          peer.on('connection', (conn) => {
            addSystemMessage('Собеседник подключился через PeerJS');
            setupPeerJSConnection(conn);
            isConnected = true;
            setControlsEnabled(true);
            statusDiv.textContent = 'соединено';
            sendMyAvatar();
            onSuccess();
          });
        } else {
          const conn = peer.connect(roomId);
          setupPeerJSConnection(conn);
          onSuccess();
        }
      });
      
      peer.on('error', (err) => {
        clearTimeout(timeout);
        console.warn(`PeerJS error (${config.host}):`, err);
        peer.destroy();
        onFail();
      });
      
      function setupPeerJSConnection(conn) {
        currentStrategy = 'peerjs';
        currentConn = conn;
        
        conn.on('open', () => {
          addSystemMessage('Соединение установлено');
          isConnected = true;
          setControlsEnabled(true);
          statusDiv.textContent = 'соединено';
          if (!isHost) sendMyAvatar();
        });
        
        conn.on('data', (data) => {
          if (data.type === 'message') {
            const msg = data.data;
            if (msg.senderId !== myPeerId) {
              const incomingMsg = { ...msg, isMy: false };
              if (msg.type === 'text') {
                addMessageToUI(incomingMsg);
                addMessageToHistory(incomingMsg);
              } else if (msg.type === 'file') {
                const blob = new Blob([msg.data], { type: msg.mime });
                const url = URL.createObjectURL(blob);
                const displayMsg = { ...msg, url: url, isMy: false };
                addMessageToUI(displayMsg);
                addMessageToHistory(displayMsg);
              } else if (msg.type === 'voice') {
                const blob = new Blob([msg.data], { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const displayMsg = { ...msg, url: url, isMy: false };
                addMessageToUI(displayMsg);
                addMessageToHistory(displayMsg);
              }
            }
          } else if (data.type === 'typing') {
            showTypingFromRemote();
          } else if (data.type === 'file_transfer' || data.type === 'voice_transfer') {
            const msg = data.data;
            if (msg.senderId !== myPeerId) {
              const incomingMsg = { ...msg, isMy: false };
              if (data.type === 'file_transfer') {
                const blob = new Blob([msg.data], { type: msg.mime });
                const url = URL.createObjectURL(blob);
                const displayMsg = { ...msg, url: url, isMy: false };
                addMessageToUI(displayMsg);
                addMessageToHistory(displayMsg);
              } else if (data.type === 'voice_transfer') {
                const blob = new Blob([msg.data], { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const displayMsg = { ...msg, url: url, isMy: false };
                addMessageToUI(displayMsg);
                addMessageToHistory(displayMsg);
              }
            }
          } else if (data.type === 'avatar') {
            peerAvatar = data.data;
            const savedMessages = [...messagesHistory];
            while (chatLog.firstChild) chatLog.removeChild(chatLog.firstChild);
            savedMessages.forEach(msg => addMessageToUI(msg));
          }
        });
        
        conn.on('close', () => {
          addSystemMessage('Соединение разорвано');
          isConnected = false;
          setControlsEnabled(false);
          statusDiv.textContent = 'не в сети';
          peerAvatar = null;
        });
        
        conn.on('error', (err) => {
          console.error('Connection error:', err);
        });
      }
    }

        // Таймаут 15 секунд
        setTimeout(() => {

      } catch(e) {

          throw new Error('uPeerJS not loaded');

        if (isHost) {
          upeerjsPeer = new UPeer(roomId, { broker: mqttBroker });

    // ------------------- Главная функция подключения с перебором стратегий -------------------
    async function connectWithFallback(roomId, isHost) {
      connectionAttempts = 0;
      
      const strategies = [
        { name: 'peerjs', func: (cb) => tryPeerJSServer(roomId, isHost, cb, () => nextStrategy()) },
        { name: 'trystero', func: (cb) => tryTrystero(roomId, isHost, cb, () => nextStrategy()) },
        { name: 'upeerjs', func: (cb) => tryUPeerJS(roomId, isHost, cb, () => nextStrategy()) }
      ];
      
      let currentIndex = 0;
      
      function nextStrategy() {
        currentIndex++;
        if (currentIndex < strategies.length) {
          addSystemMessage(`Переключаемся на стратегию: ${strategies[currentIndex].name}...`);
          strategies[currentIndex].func(() => {
            addSystemMessage(`✅ Успешно подключено через ${strategies[currentIndex].name}`);
          });
        } else {
          addSystemMessage('❌ Не удалось подключиться ни одной стратегией. Попробуйте перезагрузить страницу.');
          statusDiv.textContent = 'ошибка подключения';
        }
      }
      
      // Запускаем первую стратегию
      strategies[0].func(() => {
        addSystemMessage(`✅ Успешно подключено через ${strategies[0].name}`);
      });
    }

    // ------------------- Создание комнаты (хост) -------------------
    function createRoom() {
      currentRoomId = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 8);
      const inviteUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoomId}`;
      addSystemMessage(`Ваша ссылка-приглашение: ${inviteUrl}`);
      navigator.clipboard.writeText(inviteUrl).then(() => {
        addSystemMessage('Ссылка скопирована в буфер обмена');
      }).catch(() => addSystemMessage('Скопируйте ссылку вручную'));
      
      statusDiv.textContent = `комната: ${currentRoomId.substring(0,8)}...`;
      createPanel.classList.add('hidden');
      chatPanel.classList.remove('hidden');
      
      loadHistoryFromLocal();
      connectWithFallback(currentRoomId, true);
    }

    // ------------------- Подключение к комнате (гость) -------------------
    function joinRoom(roomId) {
      currentRoomId = roomId;
      statusDiv.textContent = 'подключение...';
      createPanel.classList.add('hidden');
      chatPanel.classList.remove('hidden');
      
      loadHistoryFromLocal();
      connectWithFallback(roomId, false);
    }

    // ------------------- Голосовые сообщения -------------------
    async function startVoiceRecording() {
      if (isRecording) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          sendVoice(audioBlob);
          stream.getTracks().forEach(track => track.stop());
          isRecording = false;
          voiceRecordBtn.style.background = 'var(--bg-input)';
        };
        mediaRecorder.start();
        isRecording = true;
        voiceRecordBtn.style.background = 'red';
        addSystemMessage('Запись... нажмите ещё раз для отправки');
        voiceRecordBtn.onclick = stopVoiceRecording;
      } catch(e) {
        addSystemMessage('Не удалось получить доступ к микрофону');
      }
    }
    
    function stopVoiceRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        voiceRecordBtn.onclick = toggleVoiceRecording;
        voiceRecordBtn.style.background = 'var(--bg-input)';
      }
    }
    
    function toggleVoiceRecording() {
      if (!isConnected) {
        addSystemMessage('Нет соединения');
        return;
      }
      if (!isRecording) startVoiceRecording();
      else stopVoiceRecording();
    }

    // ------------------- Тема, аватар, экспорт -------------------
    function setTheme(theme) {
      currentTheme = theme;
      if (theme === 'light') {
        document.body.classList.add('light');
        themeToggle.textContent = '☀️';
      } else {
        document.body.classList.remove('light');
        themeToggle.textContent = '🌙';
      }
      const faviconColor = theme === 'dark' ? '#ff9f6e' : '#e67e22';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${faviconColor}"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>`;
      const favicon = document.querySelector("link[rel*='icon']") || document.createElement('link');
      favicon.type = 'image/svg+xml';
      favicon.rel = 'icon';
      favicon.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
      document.head.appendChild(favicon);
    }
    
    function downloadHistory() {
      if (messagesHistory.length === 0) {
        addSystemMessage('Нет сообщений для сохранения');
        return;
      }
      let content = `me2u чат — история ${new Date().toLocaleString()}\n\n`;
      messagesHistory.forEach(msg => {
        const sender = msg.isMy ? 'Вы' : 'Собеседник';
        let text = '';
        if (msg.type === 'text') text = msg.text;
        else if (msg.type === 'file') text = `[Файл: ${msg.name}]`;
        else if (msg.type === 'voice') text = `[Голосовое сообщение]`;
        content += `[${new Date(msg.timestamp).toLocaleTimeString()}] ${sender}: ${text}\n`;
      });
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `me2u_history_${currentRoomId}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const size = Math.min(img.width, img.height);
            canvas.width = 100;
            canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(50, 50, 50, 0, 2 * Math.PI);
            ctx.clip();
            ctx.drawImage(img, (img.width - size)/2, (img.height - size)/2, size, size, 0, 0, 100, 100);
            const avatarUrl = canvas.toDataURL();
            myAvatar = avatarUrl;
            avatarImg.src = avatarUrl;
            localStorage.setItem('userAvatar', avatarUrl);
            sendMyAvatar();
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    }
    
    function loadAvatarFromStorage() {
      const saved = localStorage.getItem('userAvatar');
      if (saved) {
        myAvatar = saved;
        avatarImg.src = saved;
      }
    }

    // ------------------- Инициализация -------------------
    function init() {
      loadAvatarFromStorage();
      const urlParams = new URLSearchParams(window.location.search);
      const roomParam = urlParams.get('room');
      if (roomParam) {
        joinRoom(roomParam);
      } else {
        createPanel.classList.remove('hidden');
        chatPanel.classList.add('hidden');
      }
      
      createRoomBtn.addEventListener('click', createRoom);
      sendButton.addEventListener('click', () => sendTextMessage(messageInput.value));
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendButton.disabled) sendTextMessage(messageInput.value);
        if (isConnected) sendTyping();
      });
      messageInput.addEventListener('input', () => { if (isConnected) sendTyping(); });
      fileAttachBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
          for (let file of e.target.files) sendFile(file);
          fileInput.value = '';
        }
      });
      voiceRecordBtn.addEventListener('click', toggleVoiceRecording);
      themeToggle.addEventListener('click', () => {
        setTheme(currentTheme === 'dark' ? 'light' : 'dark');
      });
      downloadBtn.addEventListener('click', downloadHistory);
      avatarImg.addEventListener('click', () => avatarInput.click());
      avatarInput.addEventListener('change', handleAvatarUpload);
      
      setTheme('dark');
    }
    
    init();
  </script>
