<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>me2u — приватный чат</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "trystero": "https://esm.run/trystero@0.19.1"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/upeerjs@latest/dist/upeerjs.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{--bg-primary:#0f0f0f;--bg-secondary:#1f1f1f;--bg-input:#2c2c2e;--border-color:#2c2c2e;--text-primary:#e4e4e7;--text-secondary:#8e8e93;--accent:#ff9f6e;--accent-hover:#ffb08a;--message-incoming-bg:#1f1f1f;--message-outgoing-bg:#ff9f6e;--message-outgoing-text:#0f0f0f;--system-text:#8e8e93;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg-primary);height:100vh;display:flex;flex-direction:column;transition:background .2s,color .2s}
    body.light{--bg-primary:#f5f5f7;--bg-secondary:#fff;--bg-input:#e9e9ef;--border-color:#d9d9df;--text-primary:#1c1c1e;--text-secondary:#6c6c70;--accent:#e67e22;--accent-hover:#f39c12;--message-incoming-bg:#fff;--message-outgoing-bg:#e67e22;--message-outgoing-text:#fff;--system-text:#1c1c1e}
    .chat-header{background:var(--bg-secondary);padding:10px 16px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .chat-info{flex:1}
    .chat-name{font-weight:500;font-size:17px;color:var(--text-primary)}
    .chat-status{font-size:12px;color:var(--text-secondary);margin-top:2px}
    .theme-toggle,.download-history{background:0 0;border:none;font-size:22px;cursor:pointer;padding:8px;border-radius:50%;color:var(--text-secondary);transition:background .2s;width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center}
    .download-history{color:var(--accent);margin-right:8px}
    .theme-toggle:hover,.download-history:hover{background:var(--bg-input)}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:var(--bg-primary)}
    .message{max-width:80%;padding:8px 12px;border-radius:18px;font-size:15px;line-height:1.4;display:flex;align-items:flex-start;gap:8px}
    .message.incoming{background:var(--message-incoming-bg);color:var(--text-primary);align-self:flex-start;border-bottom-left-radius:4px}
    .message.outgoing{background:var(--message-outgoing-bg);color:var(--message-outgoing-text);align-self:flex-end;border-bottom-right-radius:4px}
    .message-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .message-content{flex:1}
    .file-message,.voice-message{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .file-message a,.voice-message audio{max-width:100%}
    .system-message{text-align:center;font-size:12px;color:var(--system-text);margin:8px auto;background:rgba(31,31,31,0.6);padding:4px 12px;border-radius:16px;align-self:center;max-width:90%}
    body.light .system-message{background:rgba(0,0,0,0.05)}
    .typing-indicator{font-size:12px;color:var(--system-text);margin:4px 16px;font-style:italic}
    .input-area{background:var(--bg-secondary);padding:8px 12px;display:flex;gap:8px;border-top:1px solid var(--border-color);flex-shrink:0;align-items:center}
    #message-input{flex:1;min-width:0;background:var(--bg-input);border:none;border-radius:24px;padding:10px 14px;color:var(--text-primary);font-size:16px;outline:none}
    .circle-btn{background:var(--bg-input);border:none;width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .1s;flex-shrink:0;color:var(--accent)}
    .circle-btn svg{width:20px;height:20px;fill:var(--accent);stroke:none}
    .circle-btn:hover{background:var(--border-color)}
    .circle-btn:active{transform:scale(0.96)}
    .create-room-panel{display:flex;justify-content:center;align-items:center;flex:1}
    .create-room-btn{width:52px;height:52px;background:var(--accent);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .1s;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
    .create-room-btn span{font-size:32px;color:#fff;font-weight:300}
    .create-room-btn:hover{background:var(--accent-hover)}
    .hidden{display:none!important}
    .avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;margin-right:12px;cursor:pointer;border:1px solid var(--border-color)}
    .header-left{display:flex;align-items:center;gap:8px}
    audio, video{max-width:100%;border-radius:12px}
    @media (max-width:600px){.chat-messages{padding:12px}.message{max-width:90%}.circle-btn{width:38px;height:38px}.circle-btn svg{width:18px;height:18px}#message-input{padding:8px 12px;font-size:15px}.input-area{padding:6px 10px;gap:6px}.create-room-btn{width:48px;height:48px}.create-room-btn span{font-size:28px}.avatar{width:32px;height:32px}.message-avatar{width:24px;height:24px}}
  </style>
</head>
<body>
<div class="chat-header">
  <div class="header-left">
    <img id="avatar-img" class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238e8e93'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="avatar">
    <div class="chat-info">
      <div class="chat-name">me2u</div>
      <div class="chat-status" id="status">не в сети</div>
    </div>
  </div>
  <div style="display:flex;align-items:center">
    <button id="download-history-btn" class="download-history" title="Скачать историю">💾</button>
    <button id="theme-toggle" class="theme-toggle">🌙</button>
  </div>
</div>
<div class="chat-messages" id="chat-log"></div>
<div id="typing-indicator" class="typing-indicator hidden">печатает</div>
<div id="create-panel" class="create-room-panel">
  <button id="create-room-btn" class="create-room-btn"><span>+</span></button>
</div>
<div id="chat-panel" class="input-area hidden">
  <input type="text" id="message-input" placeholder="Сообщение..." disabled>
  <button id="send-button" class="circle-btn" title="Отправить">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
  <button id="voice-record-btn" class="circle-btn" title="Голосовое сообщение">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
  </button>
  <button id="file-attach-btn" class="circle-btn" title="Прикрепить файл">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
  </button>
</div>
<input type="file" id="file-input" style="display:none" multiple>
<input type="file" id="avatar-input" accept="image/*" style="display:none">
<script>
  (function() {
    // Элементы DOM
    const statusDiv = document.getElementById('status');
    const chatLog = document.getElementById('chat-log');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const createPanel = document.getElementById('create-panel');
    const chatPanel = document.getElementById('chat-panel');
    const createRoomBtn = document.getElementById('create-room-btn');
    const themeToggle = document.getElementById('theme-toggle');
    const downloadBtn = document.getElementById('download-history-btn');
    const fileAttachBtn = document.getElementById('file-attach-btn');
    const voiceRecordBtn = document.getElementById('voice-record-btn');
    const fileInput = document.getElementById('file-input');
    const avatarImg = document.getElementById('avatar-img');
    const avatarInput = document.getElementById('avatar-input');
    const typingDiv = document.getElementById('typing-indicator');

    let currentRoomId = null;
    let isConnected = false;
    let myPeerId = null;
    let messagesHistory = [];
    let typingTimeout = null;
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let currentTheme = localStorage.getItem('theme') || 'dark';
    let myAvatar = localStorage.getItem('userAvatar') || null;
    let peerAvatar = null;
    let currentStrategy = null;
    let currentConn = null;
    let sendMessageCallback = null;
    let trysteroRoom = null;
    let upeerjsPeer = null;
    let pingInterval = null;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let incomingSound = null;
    let audioInitialized = false;

    function initAudioOnFirstInteraction() {
      if (audioInitialized) return;
      incomingSound = new Audio('1.mp3');
      incomingSound.load();
      audioInitialized = true;
      console.log('Звук инициализирован');
    }
    function playIncomingSound() {
      if (!audioInitialized) initAudioOnFirstInteraction();
      if (incomingSound) {
        incomingSound.currentTime = 0;
        incomingSound.play().catch(e => console.log('Автовоспроизведение заблокировано', e));
      }
    }
    function bindAudioInit() {
      [messageInput, sendButton, fileAttachBtn, voiceRecordBtn, createRoomBtn].forEach(el => {
        if (el) el.addEventListener('click', initAudioOnFirstInteraction, { once: true });
      });
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'system-message';
      div.textContent = text;
      chatLog.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function addMessageToUI(obj) {
      const div = document.createElement('div');
      div.className = `message ${obj.isMy ? 'outgoing' : 'incoming'}`;
      div.setAttribute('data-id', obj.id);
      if (!obj.isMy) {
        const av = document.createElement('img');
        av.className = 'message-avatar';
        av.src = peerAvatar || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238e8e93'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
        div.appendChild(av);
      }
      const content = document.createElement('div');
      content.className = 'message-content';
      if (obj.type === 'text') content.textContent = obj.text;
      else if (obj.type === 'file') {
        const wrap = document.createElement('div');
        wrap.className = 'file-message';
        const a = document.createElement('a');
        a.href = obj.url;
        a.download = obj.name;
        a.textContent = `📎 ${obj.name}`;
        a.target = '_blank';
        wrap.appendChild(a);
        content.appendChild(wrap);
      } else if (obj.type === 'voice') {
        const wrap = document.createElement('div');
        wrap.className = 'voice-message';
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = obj.url;
        wrap.appendChild(audio);
        content.appendChild(wrap);
      }
      div.appendChild(content);
      chatLog.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function saveHistory() {
      if (!currentRoomId) {
        console.warn('saveHistory: нет roomId');
        return;
      }
      try {
        localStorage.setItem(`chat_history_${currentRoomId}`, JSON.stringify(messagesHistory));
        console.log(`История сохранена, ${messagesHistory.length} сообщений`);
      } catch(e) {
        console.error('Ошибка сохранения истории', e);
      }
    }
    function loadHistory() {
      if (!currentRoomId) return;
      const saved = localStorage.getItem(`chat_history_${currentRoomId}`);
      if (saved) {
        try {
          messagesHistory = JSON.parse(saved);
          console.log(`История загружена, ${messagesHistory.length} сообщений`);
          while (chatLog.firstChild) chatLog.removeChild(chatLog.firstChild);
          messagesHistory.forEach(msg => addMessageToUI(msg));
        } catch(e) {
          console.error('Ошибка парсинга истории', e);
        }
      } else {
        console.log('Нет сохранённой истории для комнаты', currentRoomId);
      }
    }
    function addToHistory(msg) {
      messagesHistory.push(msg);
      saveHistory();
    }

    function sendTextMessage(text) {
      if (!text.trim() || !currentConn || !isConnected) {
        if (!isConnected) addSystemMessage('Нет соединения');
        return;
      }
      const id = Date.now() + '-' + Math.random().toString(36);
      const msg = {
        id, type: 'text', text,
        senderId: myPeerId,
        timestamp: Date.now(),
        isMy: true
      };
      if (currentStrategy === 'peerjs' && currentConn.open) currentConn.send({ type: 'message', data: msg });
      else if (currentStrategy === 'trystero' && sendMessageCallback) sendMessageCallback(msg);
      else if (currentStrategy === 'upeerjs' && upeerjsPeer) upeerjsPeer.send({ type: 'message', data: msg });
      addMessageToUI(msg);
      addToHistory(msg);
      messageInput.value = '';
    }

    function sendFile(file) {
      if (!currentConn || !isConnected) { addSystemMessage('Нет соединения'); return; }
      const reader = new FileReader();
      reader.onload = () => {
        const id = Date.now() + '-' + Math.random().toString(36);
        const msg = {
          id, type: 'file', name: file.name, mime: file.type,
          data: reader.result,
          senderId: myPeerId, timestamp: Date.now(), isMy: true
        };
        if (currentStrategy === 'peerjs' && currentConn.open) currentConn.send({ type: 'file_transfer', data: msg });
        else if (currentStrategy === 'trystero' && sendMessageCallback) sendMessageCallback({ type: 'file_transfer', data: msg });
        else if (currentStrategy === 'upeerjs' && upeerjsPeer) upeerjsPeer.send({ type: 'file_transfer', data: msg });
        const url = URL.createObjectURL(file);
        const display = { ...msg, url, isMy: true };
        addMessageToUI(display);
        addToHistory(display);
      };
      reader.readAsArrayBuffer(file);
    }

    function sendVoice(blob) {
      if (!currentConn || !isConnected) return;
      const reader = new FileReader();
      reader.onload = () => {
        const id = Date.now() + '-' + Math.random().toString(36);
        const msg = {
          id, type: 'voice', data: reader.result,
          senderId: myPeerId, timestamp: Date.now(), isMy: true
        };
        if (currentStrategy === 'peerjs' && currentConn.open) currentConn.send({ type: 'voice_transfer', data: msg });
        else if (currentStrategy === 'trystero' && sendMessageCallback) sendMessageCallback({ type: 'voice_transfer', data: msg });
        else if (currentStrategy === 'upeerjs' && upeerjsPeer) upeerjsPeer.send({ type: 'voice_transfer', data: msg });
        const url = URL.createObjectURL(blob);
        const display = { ...msg, url, isMy: true };
        addMessageToUI(display);
        addToHistory(display);
      };
      reader.readAsArrayBuffer(blob);
    }

    function sendTyping() {
      if (!currentConn || !isConnected) return;
      if (currentStrategy === 'peerjs' && currentConn.open) currentConn.send({ type: 'typing' });
      else if (currentStrategy === 'trystero' && sendMessageCallback) sendMessageCallback({ type: 'typing' });
      else if (currentStrategy === 'upeerjs' && upeerjsPeer) upeerjsPeer.send({ type: 'typing' });
    }
    function showTyping() {
      typingDiv.classList.remove('hidden');
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => typingDiv.classList.add('hidden'), 2000);
    }

    function sendMyAvatar() {
      if (currentConn && isConnected && myAvatar) {
        if (currentStrategy === 'peerjs' && currentConn.open) currentConn.send({ type: 'avatar', data: myAvatar });
        else if (currentStrategy === 'trystero' && sendMessageCallback) sendMessageCallback({ type: 'avatar', data: myAvatar });
        else if (currentStrategy === 'upeerjs' && upeerjsPeer) upeerjsPeer.send({ type: 'avatar', data: myAvatar });
      }
    }

    function setControls(enabled) {
      messageInput.disabled = !enabled;
      sendButton.disabled = !enabled;
      fileAttachBtn.disabled = !enabled;
      voiceRecordBtn.disabled = !enabled;
      if (enabled) messageInput.focus();
    }

    // Ping для стабильности
    function startPing() {
      if (pingInterval) clearInterval(pingInterval);
      pingInterval = setInterval(() => {
        if (currentConn && isConnected && currentStrategy === 'peerjs' && currentConn.open) {
          currentConn.send({ type: 'ping' });
        }
      }, 30000);
    }
    function stopPing() { if (pingInterval) clearInterval(pingInterval); }

    const ICE_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun.cloudflare.com:3478' },
        { urls: 'turn:turn.anyfirewall.com:443?transport=tcp', username: 'webrtc', credential: 'webrtc' },
        { urls: 'turn:turn2.anyfirewall.com:443?transport=tcp', username: 'webrtc', credential: 'webrtc' },
        { urls: 'turn:turn.merptv.com:443?transport=tcp', username: 'webrtc', credential: 'webrtc' },
        { urls: 'turn:freeturn.net:5349?transport=tcp', username: 'free', credential: 'free' },
        { urls: 'turn:freeturn.net:5349?transport=udp', username: 'free', credential: 'free' }
      ]
    };
    const PEER_SERVERS = [
      { host: '0.peerjs.com', port: 443, secure: true, path: '/' },
      { host: 'peerjs-server.herokuapp.com', port: 443, secure: true, path: '/' },
      { host: 'my-peerjs-server.herokuapp.com', port: 443, secure: true, path: '/' }
    ];
    let currentServerIndex = 0;

    function tryPeerJSServer(roomId, isHost, onSuccess, onFail) {
      const sig = PEER_SERVERS[currentServerIndex];
      addSystemMessage(`PeerJS (${sig.host})...`);
      const cfg = { ...sig, config: ICE_CONFIG };
      let peer;
      if (isHost) peer = new Peer(roomId, cfg);
      else peer = new Peer(cfg);
      const tm = setTimeout(() => { peer.destroy(); onFail(); }, 15000);
      peer.on('open', (id) => {
        clearTimeout(tm);
        myPeerId = id;
        if (isHost) {
          peer.on('connection', (conn) => {
            setupPeerConn(conn);
            isConnected = true; setControls(true); statusDiv.textContent = 'соединено';
            sendMyAvatar();
            onSuccess();
          });
        } else {
          const conn = peer.connect(roomId);
          setupPeerConn(conn);
          onSuccess();
        }
      });
      peer.on('error', () => { clearTimeout(tm); peer.destroy(); onFail(); });

      function setupPeerConn(conn) {
        currentStrategy = 'peerjs';
        currentConn = conn;
        conn.on('open', () => {
          addSystemMessage('PeerJS соединение');
          isConnected = true; setControls(true); statusDiv.textContent = 'соединено';
          if (!isHost) sendMyAvatar();
          startPing();
        });
        conn.on('data', (data) => {
          if (data.type === 'message') {
            const msg = data.data;
            if (msg.senderId !== myPeerId) {
              playIncomingSound();
              const inc = { ...msg, isMy: false };
              if (msg.type === 'text') { addMessageToUI(inc); addToHistory(inc); }
              else if (msg.type === 'file') {
                const blob = new Blob([msg.data], { type: msg.mime });
                const url = URL.createObjectURL(blob);
                addMessageToUI({ ...msg, url, isMy: false });
                addToHistory({ ...msg, url, isMy: false });
              } else if (msg.type === 'voice') {
                const blob = new Blob([msg.data], { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                addMessageToUI({ ...msg, url, isMy: false });
                addToHistory({ ...msg, url, isMy: false });
              }
            }
          } else if (data.type === 'typing') showTyping();
          else if (data.type === 'file_transfer' || data.type === 'voice_transfer') {
            const msg = data.data;
            if (msg.senderId !== myPeerId) {
              playIncomingSound();
              if (data.type === 'file_transfer') {
                const blob = new Blob([msg.data], { type: msg.mime });
                const url = URL.createObjectURL(blob);
                addMessageToUI({ ...msg, url, isMy: false });
                addToHistory({ ...msg, url, isMy: false });
              } else {
                const blob = new Blob([msg.data], { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                addMessageToUI({ ...msg, url, isMy: false });
                addToHistory({ ...msg, url, isMy: false });
              }
            }
          } else if (data.type === 'avatar') {
            peerAvatar = data.data;
            const saved = [...messagesHistory];
            while (chatLog.firstChild) chatLog.removeChild(chatLog.firstChild);
            saved.forEach(m => addMessageToUI(m));
          }
        });
        conn.on('close', () => {
          addSystemMessage('Соединение разорвано');
          isConnected = false; setControls(false); statusDiv.textContent = 'не в сети';
          peerAvatar = null; stopPing();
          // Автоматическое переподключение для гостя
          if (!isHost && currentRoomId) {
            addSystemMessage('Попытка переподключения через 3 секунды...');
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(() => {
              window.location.reload();
            }, 3000);
          }
        });
      }
    }

    async function tryTrystero(roomId, isHost, onSuccess, onFail) {
      addSystemMessage('Trystero...');
      try {
        const { joinRoom } = await import('trystero');
        const room = joinRoom({
          appId: 'me2u-chat-v1',
          rtcConfig: ICE_CONFIG,
          trackerUrls: ['wss://tracker.openwebtorrent.com', 'wss://tracker.webtorrent.dev', 'wss://tracker.btorrent.xyz']
        }, roomId, 'torrent');
        trysteroRoom = room;
        const [send, onMsg] = room.makeAction('chat');
        sendMessageCallback = send;
        onMsg((data, peerId) => {
          if (data && data.type === 'message') {
            const msg = data.data;
            if (msg.senderId !== myPeerId) {
              playIncomingSound();
              const inc = { ...msg, isMy: false };
              if (msg.type === 'text') { addMessageToUI(inc); addToHistory(inc); }
            }
          } else if (data && data.type === 'typing') showTyping();
          else if (data && (data.type === 'file_transfer' || data.type === 'voice_transfer')) {
            const msg = data.data;
            if (msg.senderId !== myPeerId) {
              playIncomingSound();
              if (data.type === 'file_transfer') {
                const blob = new Blob([msg.data], { type: msg.mime });
                const url = URL.createObjectURL(blob);
                addMessageToUI({ ...msg, url, isMy: false });
                addToHistory({ ...msg, url, isMy: false });
              } else {
                const blob = new Blob([msg.data], { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                addMessageToUI({ ...msg, url, isMy: false });
                addToHistory({ ...msg, url, isMy: false });
              }
            }
          } else if (data && data.type === 'avatar') {
            peerAvatar = data.data;
            const saved = [...messagesHistory];
            while (chatLog.firstChild) chatLog.removeChild(chatLog.firstChild);
            saved.forEach(m => addMessageToUI(m));
          }
        });
        room.onPeerJoin(() => {
          if (!isConnected) {
            currentStrategy = 'trystero';
            isConnected = true; setControls(true); statusDiv.textContent = 'соединено';
            addSystemMessage('Trystero соединение');
            sendMyAvatar();
            onSuccess();
          }
        });
        room.onPeerLeave(() => {
          addSystemMessage('Собеседник отключился');
          isConnected = false; setControls(false); statusDiv.textContent = 'не в сети';
          peerAvatar = null;
          if (!isHost && currentRoomId) {
            addSystemMessage('Попытка переподключения...');
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(() => window.location.reload(), 3000);
          }
        });
        setTimeout(() => { if (!isConnected) onFail(); }, 15000);
      } catch(e) { onFail(); }
    }

    async function tryUPeerJS(roomId, isHost, onSuccess, onFail) {
      addSystemMessage('uPeerJS...');
      try {
        const UPeer = window.UPeer;
        if (!UPeer) throw new Error();
        const opts = { broker: 'wss://test.mosquitto.org:8081', rtcConfig: ICE_CONFIG };
        if (isHost) {
          upeerjsPeer = new UPeer(roomId, opts);
          upeerjsPeer.on('connection', (conn) => {
            setupUPeer(conn);
            isConnected = true; setControls(true); statusDiv.textContent = 'соединено';
            sendMyAvatar();
            onSuccess();
          });
        } else {
          upeerjsPeer = new UPeer(opts);
          upeerjsPeer.on('open', () => {
            const conn = upeerjsPeer.connect(roomId);
            setupUPeer(conn);
            onSuccess();
          });
        }
        upeerjsPeer.on('error', () => onFail());
        function setupUPeer(conn) {
          currentStrategy = 'upeerjs';
          currentConn = conn;
          conn.on('open', () => {
            addSystemMessage('uPeerJS соединение');
            isConnected = true; setControls(true); statusDiv.textContent = 'соединено';
            if (!isHost) sendMyAvatar();
          });
          conn.on('data', (data) => {
            if (data.type === 'message') {
              const msg = data.data;
              if (msg.senderId !== myPeerId) {
                playIncomingSound();
                const inc = { ...msg, isMy: false };
                if (msg.type === 'text') { addMessageToUI(inc); addToHistory(inc); }
              }
            } else if (data.type === 'typing') showTyping();
            else if (data.type === 'file_transfer' || data.type === 'voice_transfer') {
              const msg = data.data;
              if (msg.senderId !== myPeerId) {
                playIncomingSound();
                if (data.type === 'file_transfer') {
                  const blob = new Blob([msg.data], { type: msg.mime });
                  const url = URL.createObjectURL(blob);
                  addMessageToUI({ ...msg, url, isMy: false });
                  addToHistory({ ...msg, url, isMy: false });
                } else {
                  const blob = new Blob([msg.data], { type: 'audio/webm' });
                  const url = URL.createObjectURL(blob);
                  addMessageToUI({ ...msg, url, isMy: false });
                  addToHistory({ ...msg, url, isMy: false });
                }
              }
            } else if (data.type === 'avatar') {
              peerAvatar = data.data;
              const saved = [...messagesHistory];
              while (chatLog.firstChild) chatLog.removeChild(chatLog.firstChild);
              saved.forEach(m => addMessageToUI(m));
            }
          });
          conn.on('close', () => {
            addSystemMessage('Соединение разорвано');
            isConnected = false; setControls(false); statusDiv.textContent = 'не в сети';
            peerAvatar = null;
            if (!isHost && currentRoomId) {
              addSystemMessage('Попытка переподключения...');
              if (reconnectTimer) clearTimeout(reconnectTimer);
              reconnectTimer = setTimeout(() => window.location.reload(), 3000);
            }
          });
        }
        setTimeout(() => { if (!isConnected) onFail(); }, 15000);
      } catch(e) { onFail(); }
    }

    function connectWithFallback(roomId, isHost) {
      const strategies = [
        { name: 'peerjs', fn: cb => tryPeerJSServer(roomId, isHost, cb, () => next()) },
        { name: 'trystero', fn: cb => tryTrystero(roomId, isHost, cb, () => next()) },
        { name: 'upeerjs', fn: cb => tryUPeerJS(roomId, isHost, cb, () => next()) }
      ];
      let idx = 0;
      function next() {
        idx++;
        if (idx < strategies.length) {
          addSystemMessage(`Переключение на ${strategies[idx].name}...`);
          strategies[idx].fn(() => addSystemMessage(`✅ ${strategies[idx].name}`));
        } else {
          addSystemMessage('❌ Не удалось подключиться. Попробуйте перезагрузить.');
          statusDiv.textContent = 'ошибка';
        }
      }
      strategies[0].fn(() => addSystemMessage(`✅ ${strategies[0].name}`));
    }

    function createRoom() {
      currentRoomId = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 8);
      const inviteUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoomId}`;
      addSystemMessage(`Ссылка: ${inviteUrl}`);
      navigator.clipboard.writeText(inviteUrl);
      statusDiv.textContent = `комната: ${currentRoomId.substring(0,8)}...`;
      createPanel.classList.add('hidden');
      chatPanel.classList.remove('hidden');
      loadHistory();   // загружаем историю, если есть
      connectWithFallback(currentRoomId, true);
    }

    function joinRoom(roomId) {
      currentRoomId = roomId;
      statusDiv.textContent = 'подключение...';
      createPanel.classList.add('hidden');
      chatPanel.classList.remove('hidden');
      loadHistory();   // загружаем историю этой комнаты
      connectWithFallback(roomId, false);
    }

    async function startVoiceRecording() {
      if (isRecording) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          sendVoice(blob);
          stream.getTracks().forEach(t => t.stop());
          isRecording = false;
          voiceRecordBtn.style.background = 'var(--bg-input)';
        };
        mediaRecorder.start();
        isRecording = true;
        voiceRecordBtn.style.background = 'red';
        addSystemMessage('Запись... нажмите ещё раз для отправки');
        voiceRecordBtn.onclick = stopVoiceRecording;
      } catch(e) { addSystemMessage('Микрофон недоступен'); }
    }
    function stopVoiceRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        voiceRecordBtn.onclick = toggleVoiceRecording;
        voiceRecordBtn.style.background = 'var(--bg-input)';
      }
    }
    function toggleVoiceRecording() {
      if (!isConnected) { addSystemMessage('Нет соединения'); return; }
      if (!isRecording) startVoiceRecording();
      else stopVoiceRecording();
    }

    function setTheme(theme) {
      currentTheme = theme;
      if (theme === 'light') document.body.classList.add('light');
      else document.body.classList.remove('light');
      themeToggle.textContent = theme === 'light' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
      const col = theme === 'dark' ? '#ff9f6e' : '#e67e22';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${col}"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>`;
      let f = document.querySelector("link[rel*='icon']");
      if (!f) { f = document.createElement('link'); f.rel = 'icon'; document.head.appendChild(f); }
      f.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
    }
    function downloadHistory() {
      if (messagesHistory.length === 0) { addSystemMessage('Нет сообщений'); return; }
      let content = `me2u история ${new Date().toLocaleString()}\n\n`;
      messagesHistory.forEach(m => {
        const sender = m.isMy ? 'Вы' : 'Собеседник';
        let txt = '';
        if (m.type === 'text') txt = m.text;
        else if (m.type === 'file') txt = `[Файл: ${m.name}]`;
        else if (m.type === 'voice') txt = '[Голосовое]';
        content += `[${new Date(m.timestamp).toLocaleTimeString()}] ${sender}: ${txt}\n`;
      });
      const blob = new Blob([content], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `me2u_${currentRoomId}.txt`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const sz = Math.min(img.width, img.height);
            canvas.width = canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(50, 50, 50, 0, 2 * Math.PI);
            ctx.clip();
            ctx.drawImage(img, (img.width - sz) / 2, (img.height - sz) / 2, sz, sz, 0, 0, 100, 100);
            const url = canvas.toDataURL();
            myAvatar = url;
            avatarImg.src = url;
            localStorage.setItem('userAvatar', url);
            sendMyAvatar();
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    }
    function loadAvatarFromStorage() { if (myAvatar) avatarImg.src = myAvatar; }

    function init() {
      loadAvatarFromStorage();
      setTheme(currentTheme);
      bindAudioInit();
      const urlParams = new URLSearchParams(window.location.search);
      const roomParam = urlParams.get('room');
      if (roomParam) {
        joinRoom(roomParam);
      } else {
        createPanel.classList.remove('hidden');
        chatPanel.classList.add('hidden');
      }
      createRoomBtn.addEventListener('click', createRoom);
      sendButton.addEventListener('click', () => sendTextMessage(messageInput.value));
      messageInput.addEventListener('keypress', e => {
        if (e.key === 'Enter' && !sendButton.disabled) sendTextMessage(messageInput.value);
        if (isConnected) sendTyping();
      });
      messageInput.addEventListener('input', () => { if (isConnected) sendTyping(); });
      fileAttachBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', e => {
        if (e.target.files.length) for (let f of e.target.files) sendFile(f);
        fileInput.value = '';
      });
      voiceRecordBtn.addEventListener('click', toggleVoiceRecording);
      themeToggle.addEventListener('click', () => setTheme(currentTheme === 'dark' ? 'light' : 'dark'));
      downloadBtn.addEventListener('click', downloadHistory);
      avatarImg.addEventListener('click', () => avatarInput.click());
      avatarInput.addEventListener('change', handleAvatarUpload);
    }
    init();
  })();
</script>
