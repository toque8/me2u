<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>me2u — приватный чат</title>
  <!-- Простая иконка-самолётик -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'%3E%3Cpath d='M2.01 21L23 12 2.01 3 2 10l15 2-15 2z'/%3E%3C/svg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Шапка чата */
    .chat-header {
      background: #1f1f1f;
      padding: 12px 16px;
      border-bottom: 1px solid #2c2c2e;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-info {
      flex: 1;
    }

    .chat-name {
      font-weight: 600;
      color: white;
      font-size: 17px;
      margin-bottom: 2px;
    }

    .chat-status {
      font-size: 13px;
      color: #8e8e93;
    }

    /* Окно сообщений */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #0f0f0f;
    }

    .message {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message.incoming {
      background: #1f1f1f;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.outgoing {
      background: #4f46e5;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .system-message {
      text-align: center;
      font-size: 12px;
      color: #8e8e93;
      margin: 8px 0;
      background: rgba(31, 31, 31, 0.6);
      padding: 4px 12px;
      border-radius: 16px;
      align-self: center;
      max-width: 90%;
    }

    /* Панель ввода */
    .input-area {
      background: #1f1f1f;
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      border-top: 1px solid #2c2c2e;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: #2c2c2e;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      color: white;
      font-size: 16px;
      outline: none;
    }

    #message-input::placeholder {
      color: #8e8e93;
    }

    #message-input:disabled {
      opacity: 0.5;
    }

    #send-button {
      background: #4f46e5;
      border: none;
      border-radius: 24px;
      padding: 0 20px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Кнопка создания комнаты */
    .create-room-panel {
      background: #1f1f1f;
      margin: 16px;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid #2c2c2e;
    }

    .create-room-panel h3 {
      margin-bottom: 16px;
      color: white;
      font-weight: 500;
    }

    .create-room-panel button {
      background: #4f46e5;
      border: none;
      border-radius: 24px;
      padding: 12px 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }

    .create-room-panel button:hover {
      background: #6366f1;
    }

    .room-link {
      margin-top: 16px;
      background: #0f0f0f;
      border-radius: 12px;
      padding: 12px;
      word-break: break-all;
      font-size: 14px;
      color: #8e8e93;
    }

    .room-link a {
      color: #4f46e5;
      text-decoration: none;
    }

    .hidden {
      display: none;
    }
  </style>
  <!-- Подключаем PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="chat-header">
    <div class="chat-info">
      <div class="chat-name">me2u чат</div>
      <div class="chat-status" id="status">⚡ Не в чате</div>
    </div>
  </div>

  <div class="chat-messages" id="chat-log">
    <div class="system-message">✨ Добро пожаловать!</div>
  </div>

  <!-- Панель создания комнаты (показывается, когда пользователь не в чате) -->
  <div id="create-panel" class="create-room-panel">
    <h3>🔒 Приватный P2P чат</h3>
    <button id="create-room-btn">➕ Создать комнату</button>
  </div>

  <!-- Панель чата (скрыта, пока комната не создана или не подключена) -->
  <div id="chat-panel" class="input-area hidden">
    <input type="text" id="message-input" placeholder="Сообщение..." disabled>
    <button id="send-button" disabled>→</button>
  </div>

  <script>
    // Весь код будет в app.js
  </script>
</body>
</html>
